# ============================================================
# SCAN SETTINGS
# ============================================================

scan_settings:
  remote_only: true            # Only return remote roles
  sponsorship_required: true   # Flag or skip roles with "no sponsorship"
  min_salary: 150000           # Skip roles with stated max below this
  title_level_filter:          # Only match these seniority levels
    - senior
    - lead
    - staff
    - principal
  exclude_titles:              # Never match these patterns
    - "junior"
    - "associate analyst"
    - "analyst i"
    - "analyst ii"
    - "entry level"
  job_boards_to_scan:
    - Greenhouse
    - Lever
    - Workday
    - Ashby
    - SmartRecruiters
    - Wellfound
    - LinkedIn (supplemental)
